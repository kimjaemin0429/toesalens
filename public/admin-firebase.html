<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퇴사렌즈 Admin - Firebase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        * { font-family: 'Pretendard', sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #ffffff; }
        .admin-card { background: rgba(30, 30, 45, 0.8); border: 1px solid rgba(124, 58, 237, 0.2); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
        .input-field { background: #0f0f1e; border: 1px solid #2a2a4e; color: #ffffff; padding: 12px 14px; border-radius: 8px; font-size: 14px; }
        .input-field:focus { outline: none; border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1); }
        textarea.input-field { resize: vertical; min-height: 120px; font-family: 'Monaco', monospace; font-size: 13px; }
        .btn-primary { background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%); color: #000; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124, 58, 237, 0.3); }
        .btn-primary:active { transform: translateY(0); }
        #auth-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-modal { background: white; border-radius: 16px; padding: 32px; width: 90%; max-width: 360px; text-align: center; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4); }
        .auth-modal h2 { font-size: 24px; font-weight: 700; color: #1a1a2e; margin-bottom: 12px; }
        .auth-modal p { font-size: 14px; color: #718096; margin-bottom: 24px; }
        .auth-modal input { width: 100%; padding: 12px 16px; border: 2px solid #e8ecf0; border-radius: 8px; font-size: 14px; margin-bottom: 12px; box-sizing: border-box; }
        .auth-modal input:focus { outline: none; border-color: #7c3aed; }
        .auth-modal button { width: 100%; padding: 12px; background: linear-gradient(135deg, #d97706, #f59e0b); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .success-message { background: #dcfce7; border: 1px solid #bbf7d0; color: #166534; padding: 12px; border-radius: 8px; font-size: 13px; }
        .error-message { background: #fee2e2; border: 1px solid #fecaca; color: #991b1b; padding: 12px; border-radius: 8px; font-size: 13px; }
        .label-text { font-size: 13px; font-weight: 600; color: #b0b0c0; margin-bottom: 8px; display: block; }
        .section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: #ffffff; }
    </style>
</head>
<body class="p-6 md:p-12">
    <!-- 인증 오버레이 -->
    <div id="auth-overlay">
        <div class="auth-modal">
            <div style="font-size: 2.5rem; margin-bottom: 12px;">🔐</div>
            <h2>퇴사렌즈 Admin</h2>
            <p>관리자 비밀번호를 입력하세요</p>
            <input 
                id="pw-input" 
                type="password" 
                placeholder="비밀번호"
                onkeydown="if(event.key==='Enter')window.checkAuth()"
            />
            <div id="auth-error" style="color: #ef4444; font-size: 12px; height: 18px; margin-bottom: 8px;"></div>
            <button onclick="checkAuth()">입력</button>
        </div>
    </div>

    <!-- 메인 콘텐츠 -->
    <div id="main-content" style="display: none;">
        <div class="max-w-4xl mx-auto">
            <!-- 헤더 -->
            <div style="margin-bottom: 32px; text-align: center;">
                <div style="font-size: 48px; font-weight: 900; margin-bottom: 8px; background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
                    퇴사렌즈
                </div>
                <div style="font-size: 14px; color: #b0b0c0; font-weight: 600;">Firebase Admin 설정</div>
            </div>

            <!-- 기본 설정 -->
            <div class="admin-card">
                <h3 class="section-title">📝 기본 설정</h3>

                <label class="label-text">프롬프트 버전</label>
                <select id="promptVersion" class="input-field" style="width: 100%; margin-bottom: 16px;">
                    <option value="v1">v1 - 기본 분석 (권장)</option>
                    <option value="v2">v2 - 상세 분석 (개발 중)</option>
                </select>

                <label class="label-text">Temperature (Claude 창의성)</label>
                <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 20px;">
                    <input 
                        id="temperature"
                        type="range" 
                        min="0" 
                        max="1" 
                        step="0.1" 
                        value="0.3"
                        style="flex: 1; cursor: pointer;"
                        oninput="window.updateTempDisplay()"
                    />
                    <span style="min-width: 50px; text-align: right; font-weight: 600; color: #7c3aed;" id="temp-display">0.3</span>
                </div>
                <p style="font-size: 12px; color: #8080a0; margin-bottom: 20px;">낮을수록 일관된 분석 · 높을수록 창의적인 분석</p>
            </div>

            <!-- 점수 가중치 -->
            <div class="admin-card">
                <h3 class="section-title">⚙️ 점수 계산 가중치</h3>

                <div style="margin-bottom: 20px;">
                    <label class="label-text">생존 자금력</label>
                    <div style="display: flex; gap: 12px; align-items: center;">
                        <input 
                            id="weight-survival"
                            type="range" 
                            min="0" 
                            max="100" 
                            value="40" 
                            style="flex: 1; cursor: pointer;"
                            oninput="window.updateWeightDisplay('survival')"
                        />
                        <span style="min-width: 40px; text-align: right; font-weight: 600; color: #7c3aed;" id="display-survival">40%</span>
                    </div>
                </div>

                <div style="margin-bottom: 20px;">
                    <label class="label-text">커리어 경쟁력</label>
                    <div style="display: flex; gap: 12px; align-items: center;">
                        <input 
                            id="weight-career"
                            type="range" 
                            min="0" 
                            max="100" 
                            value="40" 
                            style="flex: 1; cursor: pointer;"
                            oninput="window.updateWeightDisplay('career')"
                        />
                        <span style="min-width: 40px; text-align: right; font-weight: 600; color: #7c3aed;" id="display-career">40%</span>
                    </div>
                </div>

                <div style="margin-bottom: 20px;">
                    <label class="label-text">스트레스 수준</label>
                    <div style="display: flex; gap: 12px; align-items: center;">
                        <input 
                            id="weight-stress"
                            type="range" 
                            min="0" 
                            max="100" 
                            value="20" 
                            style="flex: 1; cursor: pointer;"
                            oninput="window.updateWeightDisplay('stress')"
                        />
                        <span style="min-width: 40px; text-align: right; font-weight: 600; color: #7c3aed;" id="display-stress">20%</span>
                    </div>
                </div>

                <div style="background: #0f0f1e; padding: 12px; border-radius: 6px; border: 1px solid #2a2a4e;">
                    <p style="font-size: 12px; color: #b0b0c0;">
                        <strong>총합:</strong> <span id="total-weight" style="color: #7c3aed;">100%</span>
                    </p>
                </div>
            </div>

            <!-- 프롬프트 -->
            <div class="admin-card">
                <h3 class="section-title">✍️ 분석 프롬프트</h3>
                <label class="label-text">프롬프트 텍스트</label>
                <textarea 
                    id="promptText"
                    class="input-field"
                    style="width: 100%; margin-bottom: 16px;"
                    placeholder="프롬프트를 입력하세요..."
                ></textarea>
            </div>

            <!-- 메모 -->
            <div class="admin-card">
                <h3 class="section-title">📌 메모 (내부용)</h3>
                <textarea 
                    id="memo"
                    class="input-field"
                    style="width: 100%; min-height: 80px;"
                    placeholder="수정 이력, 변경 사유 등을 메모하세요"
                ></textarea>
            </div>

            <!-- 버튼 -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 32px;">
                <button class="btn-primary" style="background: #2a2a4e; color: #ffffff;" onclick="window.loadFromFirebase()">
                    다시 불러오기
                </button>
                <button class="btn-primary" onclick="window.saveToFirebase()">
                    Firebase 저장
                </button>
            </div>

            <!-- 상태 메시지 -->
            <div id="status-message"></div>
        </div>
    </div>

<script>
    const ADMIN_PASSWORD = '0429';
    const SESSION_KEY = 'toesalens_admin_auth';

    function checkAuth() {
        const pw = document.getElementById('pw-input').value;
        if (pw === ADMIN_PASSWORD) {
            sessionStorage.setItem(SESSION_KEY, 'ok');
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            loadFromFirebase();
        } else {
            document.getElementById('auth-error').textContent = '비밀번호가 틀렸어요';
            document.getElementById('pw-input').value = '';
            document.getElementById('pw-input').focus();
        }
    }

    // 이미 인증된 경우 바로 통과
    if (sessionStorage.getItem(SESSION_KEY) === 'ok') {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
    }

    // 페이지 로드 시 비밀번호 입력창에 포커스
    window.addEventListener('load', function() {
        document.getElementById('pw-input').focus();
    });
</script>

    <!-- Firebase 초기화 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, collection, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDSgacyvysPYbZB_-p1VF4RwxaMRUtRz0s",
            authDomain: "toesalens-admin.firebaseapp.com",
            projectId: "toesalens-admin",
            storageBucket: "toesalens-admin.firebasestorage.app",
            messagingSenderId: "202198810061",
            appId: "1:202198810061:web:04d36a6425c986c90ed884"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 전역 변수에 할당 (HTML에서 접근 가능)
        window.db = db;
        window.doc = doc;
        window.getDoc = getDoc;
        window.setDoc = setDoc;

        // 인증
        const ADMIN_PASSWORD = '0429';
        const SESSION_KEY = 'toesalens_admin_auth';

        window.checkAuth = function() {
            const pw = document.getElementById('pw-input').value;
            if (pw === ADMIN_PASSWORD) {
                sessionStorage.setItem(SESSION_KEY, 'ok');
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                window.loadFromFirebase();
            } else {
                document.getElementById('auth-error').textContent = '비밀번호가 틀렸어요';
                document.getElementById('pw-input').value = '';
                document.getElementById('pw-input').focus();
            }
        };

        // 이미 인증된 경우 바로 통과
        if (sessionStorage.getItem(SESSION_KEY) === 'ok') {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            window.loadFromFirebase();
        }

        // Firestore에서 로드
        window.loadFromFirebase = async function() {
            try {
                const docRef = window.doc(window.db, 'toesalens_config', 'main');
                const docSnap = await window.getDoc(docRef);
                
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('promptVersion').value = data.promptVersion || 'v1';
                    document.getElementById('temperature').value = data.temperature || 0.3;
                    document.getElementById('promptText').value = data.promptText || '';
                    document.getElementById('memo').value = data.memo || '';
                    
                    if (data.weights) {
                        document.getElementById('weight-survival').value = data.weights.survival || 40;
                        document.getElementById('weight-career').value = data.weights.career || 40;
                        document.getElementById('weight-stress').value = data.weights.stress || 20;
                    }
                    
                    window.updateWeightDisplay('survival');
                    window.updateWeightDisplay('career');
                    window.updateWeightDisplay('stress');
                    window.updateTempDisplay();
                    window.showStatus('✅ Firestore에서 데이터를 로드했습니다', 'success');
                } else {
                    window.showStatus('ℹ️ 첫 실행입니다. 설정을 입력하고 저장하세요', 'info');
                }
            } catch (e) {
                window.showStatus('❌ 로드 실패: ' + e.message, 'error');
                console.error('Load error:', e);
            }
        };

        // Firestore에 저장
        window.saveToFirebase = async function() {
            try {
                const totalWeight = 
                    parseInt(document.getElementById('weight-survival').value) +
                    parseInt(document.getElementById('weight-career').value) +
                    parseInt(document.getElementById('weight-stress').value);

                if (totalWeight !== 100) {
                    window.showStatus('❌ 가중치 합이 100%이어야 합니다 (현재: ' + totalWeight + '%)', 'error');
                    return;
                }

                const data = {
                    promptVersion: document.getElementById('promptVersion').value,
                    temperature: parseFloat(document.getElementById('temperature').value),
                    promptText: document.getElementById('promptText').value,
                    memo: document.getElementById('memo').value,
                    weights: {
                        survival: parseInt(document.getElementById('weight-survival').value),
                        career: parseInt(document.getElementById('weight-career').value),
                        stress: parseInt(document.getElementById('weight-stress').value)
                    },
                    lastUpdate: new Date().toISOString()
                };

                const docRef = window.doc(window.db, 'toesalens_config', 'main');
                await window.setDoc(docRef, data);
                window.showStatus('✅ Firebase에 저장되었습니다!', 'success');
            } catch (e) {
                window.showStatus('❌ 저장 실패: ' + e.message, 'error');
                console.error('Save error:', e);
            }
        };

        // UI 헬퍼 함수
        window.updateWeightDisplay = function(type) {
            const val = document.getElementById('weight-' + type).value;
            document.getElementById('display-' + type).textContent = val + '%';
            window.updateTotalWeight();
        };

        window.updateTotalWeight = function() {
            const total = 
                parseInt(document.getElementById('weight-survival').value) +
                parseInt(document.getElementById('weight-career').value) +
                parseInt(document.getElementById('weight-stress').value);
            
            const el = document.getElementById('total-weight');
            el.textContent = total + '%';
            el.style.color = total === 100 ? '#dcfce7' : '#ef4444';
        };

        window.updateTempDisplay = function() {
            const val = document.getElementById('temperature').value;
            document.getElementById('temp-display').textContent = parseFloat(val).toFixed(1);
        };

        window.showStatus = function(message, type) {
            const el = document.getElementById('status-message');
            const className = type === 'success' ? 'success-message' : type === 'error' ? 'error-message' : 'success-message';
            el.innerHTML = `<div class="${className}">${message}</div>`;
            setTimeout(() => {
                el.innerHTML = '';
            }, 4000);
        };
    </script>
</body>
</html>
